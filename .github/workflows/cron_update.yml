name: Daily Stock Data Update

on:
  schedule:
    # UTC 오전 01:30 = 한국 시간(KST) 화~토 오전 10:30 자동 실행
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 💡 Node.js 24 규격에 맞춰 최신 버전 가방(v5, v6)으로 교체했습니다.
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install yfinance

    - name: Run Update Script
      run: python update_table.py

    - - name: Commit and Push if index.html changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 1. 파일들을 스테이징하고 커밋하기 전에, 원격 서버의 최신 커밋들을 안전하게 먼저 가져와 합칩니다.
        git fetch origin main
        git pull origin main --rebase
        
        # 2. 그 상태에서 새로 생성/수정된 index.html을 추적합니다.
        git add index.html
        
        # 3. 변경 사항이 있을 때만 최종적으로 커밋 후 서버에 안전하게 푸시합니다.
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-Update: Latest Market Close Data" && git push origin main)
