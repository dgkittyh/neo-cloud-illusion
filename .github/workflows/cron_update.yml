name: Neo-Cloud Illusion Live Update

on:
  schedule:
    # 매일 미국 장 마감 이후 자동으로 돌도록 스케줄링
    - cron: '0 23 * * 1-5'
  workflow_dispatch: # 웹에서 'Run workflow' 버튼으로 수동 즉시 실행 가능

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    # 💡 [교정 완료] 정식 파이썬 셋업 액션 주소로 수정했습니다.
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 yfinance

    - name: Run Python Script
      run: python update_table.py

    # 🎯 [영구 해결] 장바구니 충돌을 원천 차단하는 무결점 깃 시퀀스
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 1. 파이썬이 구워낸 최신 파일들을 장바구니에 담습니다.
        git add history.json index.html
        
        # 2. 장바구니에 담긴 내역이 있을 때만 '먼저 로컬 커밋(결제)'을 완료합니다.
        # 이렇게 해야 pull --rebase를 할 때 장바구니가 비어있어서 튕기지 않습니다.
        if ! git diff --cached --quiet; then
          git commit -m "📡 라이브 데이터 및 타임스탬프 동기화 빌드"
          
          # 3. 내 커밋을 안전하게 확보한 상태에서 깃허브 서버의 최신 상태를 당겨와 줄을 세웁니다.
          git pull origin main --rebase
          
          # 4. 정렬이 완료된 최종 결과물을 원격 저장소에 쏘아 올립니다.
          git push origin main
        else
          echo "변동 사항이 없으므로 빌드를 종료합니다."
        fi
