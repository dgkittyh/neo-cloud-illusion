name: Daily Stock Data Update

on:
  schedule:
    # UTC 오전 01:30 = 한국 시간(KST) 화~토 오전 10:30 자동 실행
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 💡 야후 파이낸스 라이브러리를 가상 컴퓨터에 설치하는 사전 설정을 추가했습니다.
    - name: Install Dependencies
      run: |
        pip install yfinance

    - name: Run Update Script
      run: python update_table.py

    - name: Commit and Push if index.html changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-Update: Latest Market Close Data" && git push)
