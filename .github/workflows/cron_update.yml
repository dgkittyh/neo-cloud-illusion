name: Daily Stock Data Update

on:
  schedule:
    # UTC 오전 01:30 = 한국 시간(KST) 화~토 오전 10:30 자동 실행
    - cron: '30 1 * * 1-5'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    # 💡 Node.js 24 규격에 맞춰 최신 버전 가방(v5, v6)으로 교체했습니다.
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install yfinance

    - name: Run Update Script
      run: python update_table.py

    - name: Commit and Push if index.html changed
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git pull --rebase # 💡 이 한 줄을 추가해서 서버의 최신 수정본을 먼저 받아오도록 합니다.
        git add index.html
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-Update: Latest Market Close Data" && git push)
